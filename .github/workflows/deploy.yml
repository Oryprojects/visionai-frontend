name: Frontend CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: |
          docker build -t oryprojectsdocker/visionai-frontend:latest .

      - name: Restart Frontend Deployment
        run: |
          kubectl rollout restart deployment visionai-frontend