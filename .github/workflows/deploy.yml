name: Frontend CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v3
        with:
          clean: true
          fetch-depth: 0

      - name: Login to DockerHub
        run: |
          echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Build Docker image
        run: |
          docker build --no-cache -t oryprojectsdocker/visionai-frontend:latest .

      - name: Push Docker image
        run: |
          docker push oryprojectsdocker/visionai-frontend:latest

      - name: Restart Frontend Deployment
        run: |
          kubectl rollout restart deployment visionai-frontend