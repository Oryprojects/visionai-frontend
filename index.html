    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://www.visionai.jp/" />
    <meta name="twitter:title" content="VisionAI - AI Solutions & Digital Transformation" />
    <meta name="twitter:description" content="Transform your business with intelligent AI solutions. VisionAI provides cutting-edge AI consulting, predictive analytics, and digital transformation services." />
    <meta name="twitter:image" content="/logo.png" />
    <meta name="twitter:image:alt" content="VisionAI Logo" />
    <link rel="icon" href="/logo.png" type="image/png" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        html, body {
            margin: 0;
            height: 100%;
            background: #000;
        }
        /* Use relative/absolute positioning for in-page videos; avoid fixed on mobile to prevent controls/keyboard issues */
        video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
            display: block;
        }
        #playOverlay {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.6);
            color: #fff;
            font: 16px/1.4 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        }
        #playBtn {
            appearance: none;
            border: 0;
            border-radius: 6px;
            padding: 12px 16px;
            background: #ffffff;
            color: #000;
            font-weight: 600;
            cursor: pointer;
        }
        /* Show app immediately */
        #root { display: block; }
    </style>
</head>
<body>
	<!-- Intro video removed to allow immediate page load -->

	<!-- React app mounts here, initially hidden -->
	<div id="root"></div>

	<!-- Intro gating script removed -->

	<!-- Lottie web component for animations on Blog page and others -->
	<script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

	<script type="module" src="/src/main.tsx"></script>
</body>
</html>
