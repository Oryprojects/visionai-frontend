        html, body {

        }
        /* Use relative/absolute positioning for in-page videos; avoid fixed on mobile to prevent controls/keyboard issues */
        video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
            display: block;
        }
        #playOverlay {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.6);
            color: #fff;
            font: 16px/1.4 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        }
        #playBtn {
            appearance: none;
            border: 0;
            border-radius: 6px;
            padding: 12px 16px;
            background: #ffffff;
            color: #000;
            font-weight: 600;
            cursor: pointer;
        }
        /* Show app immediately */
        #root { display: block; }
    </style>
