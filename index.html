<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    
    <!-- ✅ Correct favicon setup -->
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="manifest" href="/manifest.json">

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google-site-verification" content="6hVqseAI7_2P5-CyGWOguBxGOxP5mmIH_oMM8XN1qm0" />
    <meta name="theme-color" content="#0ea5e9" />

    <title>VisionAI</title>
    <meta name="description" content="Transform your business with intelligent AI solutions. VisionAI provides cutting-edge AI consulting, predictive analytics, and digital transformation services." />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        html, body {
            margin: 0;
            height: 100%;
            background: #000;
        }

        /* Use relative/absolute positioning for in-page videos; avoid fixed on mobile to prevent controls/keyboard issues */
        video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
            display: block;
        }

        #playOverlay {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.6);
            color: #fff;
            font: 16px/1.4 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        }

        #playBtn {
            appearance: none;
            border: 0;
            border-radius: 6px;
            padding: 12px 16px;
            background: #ffffff;
            color: #000;
            font-weight: 600;
            cursor: pointer;
        }

        /* Show app immediately */
        #root { display: block; }
    </style>
</head>

<body>
	<div id="root"></div>

	<script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <script type="module" src="/src/main.tsx"></script>

</body>
</html>
